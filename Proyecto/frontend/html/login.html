<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../JS/login.js"></script>

    <div class="container">
        <div class="logo">
            <img src="../../assets/images/logo.jpeg" alt="Logo de la aplicación">
        </div>
        
        <div class="form-box" id="loginForm">
            <h2>Te damos la bienvenida a VNKmedia</h2>
            <p class="subtitle">Encuentra nuevas ideas para intentar</p>
            
            <form>
                <div class="input-group">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="Introduce tu correo" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="Crea una contraseña" required>
                </div>
                <a href="#" class="forgot-pass">¿Has olvidado tu contraseña?</a>
                <button type="submit" class="btn btn-red">Iniciar sesión</button>
            </form>

            <div class="divider"><span>O</span></div>
            <button type="button" id="btn-invitado" class="btn" style="background-color: #efefef; color: #333333;">
                <i class="fa-solid fa-user-secret"></i> Entrar como Invitado
            </button>
            <p class="footer-text">¿Aún no estás en Pinterest? <a href="register.html">Regístrate</a></p>
        </div>
    </div>


</body>
</html>
